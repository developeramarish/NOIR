<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NOIR - Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: #fafafa;
      color: #1a1a2e;
      padding: 1.5rem;
    }

    .container {
      text-align: center;
      max-width: 420px;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 64px;
      margin-bottom: 1.5rem;
    }

    .logo svg {
      width: 64px;
      height: 64px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }

    .brand {
      color: #4F46E5;
    }

    p {
      font-size: 1rem;
      color: #6b7280;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    button {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.625rem 1.5rem;
      font-size: 0.875rem;
      font-weight: 500;
      color: #fff;
      background-color: #4F46E5;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    button:hover { background-color: #4338CA; }
    button:active { background-color: #3730A3; }

    @media (prefers-color-scheme: dark) {
      body {
        background-color: #080810;
        color: #e5e5e5;
      }
      p { color: #9ca3af; }
      .brand { color: #818CF8; }
      button { background-color: #6366F1; }
      button:hover { background-color: #4F46E5; }
      button:active { background-color: #4338CA; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo" aria-hidden="true">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="32" cy="32" r="28" stroke="#4F46E5" stroke-width="2" stroke-opacity="0.3" />
        <circle cx="32" cy="32" r="20" stroke="#4F46E5" stroke-width="2" stroke-opacity="0.5" />
        <circle cx="32" cy="32" r="12" stroke="#4F46E5" stroke-width="2.5" stroke-opacity="0.9" />
      </svg>
    </div>
    <h1>You are <span class="brand">offline</span></h1>
    <p>It looks like you've lost your internet connection. Please check your network and try again.</p>
    <button onclick="window.location.reload()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 2v6h-6" /><path d="M3 12a9 9 0 0 1 15-6.7L21 8" /><path d="M3 22v-6h6" /><path d="M21 12a9 9 0 0 1-15 6.7L3 16" />
      </svg>
      Retry
    </button>
  </div>
</body>
</html>
